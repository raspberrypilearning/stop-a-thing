<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Runaway Robot Starter</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <script defer src="main.js"></script>
  </head>
  <body>
    <main class="project-card">
      <p class="eyebrow">Stop the loop</p>
      <h1>Runaway Robot</h1>
      <p class="intro">Watch the robot race across the field, then stop the loop with the keyboard or the mouse.</p>
      <p id="status-text" class="status" aria-live="polite">Press <kbd>SPACE</kbd> or click the picture to stop the robot.</p>
      <div id="sketch-holder" class="sketch-holder">
        <img class="backdrop" src="backdrop.png" alt="" aria-hidden="true">
      </div>
    </main>
  </body>
</html>
